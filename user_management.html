<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/user_management.css" />
  </head>

  <body>
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <div>
          <div class="page-title">User Management</div>
          <div class="page-subtitle">
            Manage system users and access levels
          </div>
        </div>

        <button class="btn-add-user" onclick="openAddModal()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Add User
        </button>
      </div>

      <!-- Logged-in User Card -->
      <div class="logged-in-card">
        <div class="logged-in-info">
          <div class="avatar avatar-green">U</div>

          <div>
            <div class="logged-in-label">Logged in as</div>
            <div class="logged-in-name">User</div>
          </div>
        </div>

        <div class="role-badge-viewer">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>

          Viewer
        </div>
      </div>

      <!-- System Users Card -->
      <div class="system-users-card">
        <div class="card-title">System Users</div>

        <div class="table-wrapper">
          <table class="user-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="userModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">Add User</div>

        <div class="form-group">
          <label class="form-label">Full Name</label>

          <input
            type="text"
            class="form-input"
            id="inputName"
            placeholder="Enter full name"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>

          <input
            type="text"
            class="form-input"
            id="inputUsername"
            placeholder="Enter username"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>

          <input
            type="email"
            class="form-input"
            id="inputEmail"
            placeholder="Enter email address"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>

          <select class="form-select" id="inputRole">
            <option value="Administrator">Administrator</option>
            <option value="Encoder">Encoder</option>
            <option value="Viewer">Viewer</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Status</label>

          <select class="form-select" id="inputStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">
            Cancel
          </button>

          <button class="btn-save" id="btnSave" onclick="saveUser()">
            Add User
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
      <div class="modal">
        <div class="modal-title">Delete User</div>

        <p class="confirm-text">
          Are you sure you want to delete
          <strong id="deleteUserName"></strong>?
          This action cannot be undone.
        </p>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeDeleteModal()">
            Cancel
          </button>

          <button class="btn-confirm-delete" onclick="confirmDelete()">
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/user_management.js"></script>
  </body>
</html>
